<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}LidaShield{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=Cormorant+Garamond:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --gold:      #C9A84C;
      --gold-light:#E8C97A;
      --gold-dim:  #7A6330;
      --black:     #0A0A0A;
      --surface:   #111111;
      --surface2:  #181818;
      --border:    #2A2A2A;
      --text:      #E0D5C0;
      --text-muted:#6B6355;
      --danger:    #C0392B;
      --safe:      #27AE60;
      --mono:      'DM Mono', monospace;
      --serif:     'Cormorant Garamond', serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--black);
      color: var(--text);
      font-family: var(--mono);
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Nav ── */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      height: 56px;
      border-bottom: 1px solid var(--border);
      background: rgba(10,10,10,0.95);
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(8px);
    }
    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: var(--gold);
      font-family: var(--serif);
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.04em;
    }
    .nav-logo svg { width: 28px; height: 28px; flex-shrink: 0; }
    .nav-links {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .nav-links a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 12px;
      padding: 6px 12px;
      border-radius: 4px;
      transition: color 0.2s, background 0.2s;
    }
    .nav-links a:hover { color: var(--text); background: var(--surface); }
    .nav-links a.active { color: var(--gold); }
    .btn-nav {
      background: var(--gold);
      color: var(--black) !important;
      font-weight: 500;
      border-radius: 4px;
    }
    .btn-nav:hover { background: var(--gold-light) !important; color: var(--black) !important; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 10px 20px;
      border: none;
      border-radius: 4px;
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .btn-primary   { background: var(--gold); color: var(--black); }
    .btn-primary:hover { background: var(--gold-light); }
    .btn-ghost     { background: transparent; color: var(--text-muted); border: 1px solid var(--border); }
    .btn-ghost:hover { border-color: var(--gold-dim); color: var(--text); }
    .btn-danger    { background: var(--danger); color: #fff; }
    .btn-danger:hover { filter: brightness(1.1); }
    .btn-success   { background: var(--safe); color: #fff; }
    .btn:disabled  { opacity: 0.4; cursor: not-allowed; }
    .btn-sm        { padding: 6px 12px; font-size: 11px; }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
    }

    /* ── Badges ── */
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 3px;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .badge-free   { background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border); }
    .badge-shield { background: rgba(201,168,76,0.15); color: var(--gold); border: 1px solid var(--gold-dim); }
    .badge-pro    { background: rgba(201,168,76,0.25); color: var(--gold-light); border: 1px solid var(--gold); }
    .badge-threat { background: rgba(192,57,43,0.15); color: #E74C3C; border: 1px solid rgba(192,57,43,0.3); }
    .badge-safe   { background: rgba(39,174,96,0.15); color: #2ECC71; border: 1px solid rgba(39,174,96,0.3); }
    .badge-pending{ background: rgba(243,156,18,0.15); color: #F39C12; border: 1px solid rgba(243,156,18,0.3); }

    /* ── Result banner ── */
    .result-box {
      padding: 16px 20px;
      border-radius: 6px;
      font-size: 13px;
      display: none;
      margin-top: 12px;
    }
    .result-threat { background: rgba(192,57,43,0.12); border: 1px solid rgba(192,57,43,0.35); color: #E74C3C; }
    .result-safe   { background: rgba(39,174,96,0.12);  border: 1px solid rgba(39,174,96,0.35);  color: #2ECC71; }
    .result-unknown{ background: rgba(243,156,18,0.12); border: 1px solid rgba(243,156,18,0.35); color: #F39C12; }

    /* ── Input ── */
    .input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 10px 14px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      transition: border-color 0.2s;
      outline: none;
    }
    .input:focus   { border-color: var(--gold-dim); }
    textarea.input { resize: vertical; min-height: 80px; }

    /* ── Progress bar ── */
    .usage-bar {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 6px;
    }
    .usage-bar-fill {
      height: 100%;
      background: var(--gold);
      border-radius: 2px;
      transition: width 0.4s ease;
    }

    /* ── Table ── */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    th, td {
      padding: 10px 14px;
      text-align: left;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
    }
    th { color: var(--text-muted); font-weight: 400; text-transform: uppercase; letter-spacing: 0.06em; }
    td { color: var(--text); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--surface2); }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      gap: 4px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .tab {
      padding: 8px 16px;
      font-size: 12px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      color: var(--text-muted);
      margin-bottom: -1px;
      transition: color 0.2s;
      white-space: nowrap;
      user-select: none;
    }
    .tab:hover   { color: var(--text); }
    .tab.active  { color: var(--gold); border-bottom-color: var(--gold); }

    .tab-panel   { display: none; }
    .tab-panel.active { display: block; }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 12px 18px;
      border-radius: 6px;
      font-size: 12px;
      z-index: 9999;
      opacity: 0;
      transform: translateY(8px);
      transition: all 0.3s;
      pointer-events: none;
      max-width: 300px;
    }
    #toast.show { opacity: 1; transform: translateY(0); }
    #toast.success { background: #1A3A28; border: 1px solid var(--safe); color: #2ECC71; }
    #toast.error   { background: #3A1A1A; border: 1px solid var(--danger); color: #E74C3C; }

    /* ── Spinner ── */
    .spin {
      width: 14px; height: 14px;
      border: 2px solid transparent;
      border-top-color: currentColor;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Mobile ── */
    @media (max-width: 640px) {
      nav { padding: 0 16px; }
      .nav-links .hide-mobile { display: none; }
      .card { padding: 14px; }
    }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <nav>
    <a href="/" class="nav-logo">
      <!-- Gold shield icon -->
      <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M14 2L4 6v8c0 6 4.5 10.5 10 12 5.5-1.5 10-6 10-12V6L14 2z"
              stroke="#C9A84C" stroke-width="1.5" fill="rgba(201,168,76,0.08)"/>
        <path d="M9 14l3.5 3.5L19 10" stroke="#C9A84C" stroke-width="1.5"
              stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      LidaShield
    </a>
    <div class="nav-links">
      {% if user %}
        <a href="/dashboard">Dashboard</a>
        {% if request.path == '/admin' or request.path.startswith('/admin') %}
          <a href="/admin" class="active hide-mobile">Admin</a>
        {% endif %}
        <a href="/logout">Logout</a>
      {% else %}
        <a href="/#pricing" class="hide-mobile">Pricing</a>
        <a href="/login" class="btn-nav btn">Login</a>
      {% endif %}
    </div>
  </nav>

  {% block content %}{% endblock %}

  <div id="toast"></div>

  <script>
    // Tabs
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        const group = tab.dataset.group;
        const target = tab.dataset.tab;
        document.querySelectorAll(`.tab[data-group="${group}"]`).forEach(t => t.classList.remove('active'));
        document.querySelectorAll(`.tab-panel[data-group="${group}"]`).forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        document.querySelector(`.tab-panel[data-group="${group}"][data-tab="${target}"]`)?.classList.add('active');
      });
    });

    // Toast
    function toast(msg, type = 'success') {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.className = `show ${type}`;
      clearTimeout(el._t);
      el._t = setTimeout(() => el.classList.remove('show'), 3500);
    }

    // Fetch helper
    async function api(url, body) {
      const r = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      return r.json();
    }

    // SHA-1 in browser (for password checker — never sends plaintext)
    async function sha1(str) {
      const buf = await crypto.subtle.digest('SHA-1', new TextEncoder().encode(str));
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('').toUpperCase();
    }
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
