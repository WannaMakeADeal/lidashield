<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LidaShield — Scam Link Protection</title>
<link rel="icon" type="image/png" href="/static/lidashield-icon.png">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=DM+Mono:wght@300;400;500&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#03030a;
  --bg2:#070711;
  --card:rgba(255,255,255,.045);
  --card2:rgba(255,255,255,.075);
  --gold:#f0a830;
  --gold2:#ffd27a;
  --gold3:rgba(240,168,48,.22);
  --text:#f4efe6;
  --muted:#8c8376;
  --muted2:#5c554d;
  --border:rgba(240,168,48,.18);
  --red:#ff5c68;
  --green:#54d483;
  --orange:#f0a830;
  --blue:#78a6ff;
  --shadow:0 30px 80px rgba(0,0,0,.45);
  --transition:cubic-bezier(0.34, 1.56, 0.64, 1);
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

html{
  scroll-behavior:smooth;
}

body{
  min-height:100vh;
  background:
    radial-gradient(circle at 20% 20%, rgba(240,168,48,.08), transparent 26%),
    radial-gradient(circle at 80% 10%, rgba(255,255,255,.05), transparent 20%),
    radial-gradient(circle at 50% 100%, rgba(240,168,48,.08), transparent 30%),
    var(--bg);
  color:var(--text);
  font-family:Inter, system-ui, sans-serif;
  overflow-x:hidden;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  background-image:
    linear-gradient(rgba(255,255,255,.018) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.018) 1px, transparent 1px);
  background-size:42px 42px;
  mask-image:linear-gradient(to bottom, black, transparent 85%);
  pointer-events:none;
  z-index:0;
}

body::after{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle, rgba(255,208,122,.09) 1px, transparent 1px);
  background-size:120px 120px;
  opacity:.42;
  pointer-events:none;
  z-index:0;
}

/* 3D Starfield */
.starfield-3d{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:0;
  perspective:1000px;
  overflow:hidden;
}

.stars-container{
  width:100%;
  height:100%;
  transform-style:preserve-3d;
  position:relative;
  will-change:transform;
}

.star-3d{
  position:absolute;
  width:2px;
  height:2px;
  background:var(--gold);
  border-radius:50%;
  box-shadow:0 0 4px rgba(240,168,48,.9);
  transform-style:preserve-3d;
}

.page{
  position:relative;
  z-index:1;
}

/* Navbar */

.nav{
  position:fixed;
  top:0;
  left:0;
  right:0;
  height:76px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 42px;
  background:rgba(3,3,10,.72);
  backdrop-filter:blur(22px);
  border-bottom:1px solid var(--border);
  z-index:50;
}

.brand{
  display:flex;
  align-items:center;
  gap:14px;
  text-decoration:none;
  color:var(--text);
  transition:transform .3s ease;
}

.brand:hover{
  transform:translateY(-1px);
}

.logo-mark{
  width:42px;
  height:42px;
  position:relative;
  border:1px solid var(--gold3);
  border-radius:14px;
  background:
    linear-gradient(135deg, rgba(240,168,48,.22), rgba(255,255,255,.02));
  box-shadow:0 0 30px rgba(240,168,48,.12);
  overflow:hidden;
}

.logo-mark::before{
  content:"";
  position:absolute;
  width:16px;
  height:16px;
  top:6px;
  left:7px;
  border-radius:50%;
  background:var(--gold2);
  box-shadow:0 0 20px rgba(240,168,48,.75);
}

.logo-mark::after{
  content:"L";
  position:absolute;
  left:12px;
  top:7px;
  font-family:Cormorant Garamond, serif;
  font-size:31px;
  font-weight:500;
  color:var(--gold);
}

.brand-text{
  display:flex;
  flex-direction:column;
  line-height:1.1;
}

.brand-name{
  font-family:Cormorant Garamond, serif;
  font-size:25px;
  letter-spacing:.04em;
  color:var(--gold2);
  font-weight:500;
}

.brand-sub{
  font-family:DM Mono, monospace;
  font-size:10px;
  letter-spacing:.18em;
  color:var(--muted);
  text-transform:uppercase;
}

.nav-right{
  display:flex;
  align-items:center;
  gap:12px;
}

.nav-right.auth-loading #loginBtn,
.nav-right.auth-loading #logoutBtn,
.nav-right.auth-loading #userPill{
  visibility:hidden;
}

.user-pill{
  display:none;
  align-items:center;
  gap:10px;
  padding:9px 12px;
  border:1px solid var(--border);
  background:rgba(255,255,255,.035);
  border-radius:999px;
  color:var(--muted);
  font-family:DM Mono, monospace;
  font-size:11px;
  transition:all .3s ease;
}

.user-pill:hover{
  background:rgba(255,255,255,.06);
  border-color:rgba(240,168,48,.35);
}

.user-pill.show{
  display:flex;
}

.avatar{
  width:22px;
  height:22px;
  border-radius:50%;
  background:var(--gold);
}

.plan-badge{
  padding:5px 9px;
  border-radius:999px;
  border:1px solid var(--gold3);
  color:var(--gold2);
  background:rgba(240,168,48,.08);
  text-transform:uppercase;
  font-size:10px;
  letter-spacing:.12em;
  font-weight:600;
}

.btn{
  border:1px solid var(--border);
  background:rgba(255,255,255,.04);
  color:var(--text);
  padding:11px 15px;
  border-radius:12px;
  font-family:Inter, system-ui, sans-serif;
  font-size:11px;
  letter-spacing:.1em;
  text-transform:uppercase;
  cursor:pointer;
  transition:.2s cubic-bezier(0.34, 1.56, 0.64, 1);
  text-decoration:none;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  font-weight:600;
}

.btn:hover:not(:disabled){
  border-color:rgba(240,168,48,.45);
  background:rgba(240,168,48,.12);
  transform:translateY(-2px);
  box-shadow:0 8px 24px rgba(240,168,48,.15);
}

.btn:active:not(:disabled){
  transform:translateY(0);
}

.btn.gold{
  background:linear-gradient(135deg, var(--gold), var(--gold2));
  color:#080805;
  border-color:var(--gold);
  font-weight:700;
}

.btn.gold:hover:not(:disabled){
  transform:translateY(-2px);
  box-shadow:0 12px 32px rgba(240,168,48,.25);
  background:linear-gradient(135deg, var(--gold2), #ffdc94);
}

.btn.ghost{
  color:var(--muted);
}

.btn.hide{
  display:none;
}

.btn:disabled{
  opacity:.5;
  cursor:not-allowed;
}

/* Hero */

.hero{
  min-height:auto;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:128px 22px 76px;
  text-align:center;
  animation:fadeInHero .6s ease-out;
}

@keyframes fadeInHero{
  from{
    opacity:0;
    transform:translateY(20px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

.kicker{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:14px;
  color:var(--gold);
  font-family:DM Mono, monospace;
  font-size:11px;
  letter-spacing:.24em;
  text-transform:uppercase;
  margin-bottom:24px;
  font-weight:600;
  animation:fadeInHero .6s ease-out .1s both;
}

.kicker::before,
.kicker::after{
  content:"";
  width:54px;
  height:1px;
  background:linear-gradient(90deg, transparent, var(--gold));
}

.kicker::after{
  background:linear-gradient(90deg, var(--gold), transparent);
}

h1{
  font-family:Cormorant Garamond, serif;
  font-size:clamp(54px, 8.5vw, 112px);
  line-height:.88;
  font-weight:400;
  letter-spacing:-.04em;
  max-width:980px;
  animation:fadeInHero .6s ease-out .2s both;
}

h1 em{
  color:var(--gold);
  font-style:italic;
  font-weight:500;
}

.hero-copy{
  margin-top:24px;
  max-width:650px;
  color:var(--muted);
  line-height:1.8;
  font-family:Inter, system-ui, sans-serif;
  font-size:14px;
  animation:fadeInHero .6s ease-out .3s both;
  font-weight:400;
}

.scanner-shell{
  width:min(920px, 100%);
  scroll-margin-top:96px;
  margin-top:54px;
  padding:2px;
  border-radius:30px;
  background:
    linear-gradient(135deg, rgba(240,168,48,.45), rgba(255,255,255,.08), rgba(240,168,48,.18));
  box-shadow:var(--shadow);
  animation:fadeInHero .6s ease-out .4s both;
}

.scanner{
  border-radius:29px;
  background:
    linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.025)),
    rgba(6,6,14,.93);
  border:1px solid rgba(255,255,255,.08);
  padding:42px;
  text-align:left;
  overflow:hidden;
  position:relative;
}

.scanner::before{
  content:"";
  position:absolute;
  width:320px;
  height:320px;
  right:-150px;
  top:-160px;
  border-radius:50%;
  background:rgba(240,168,48,.09);
  filter:blur(10px);
}

.scanner-top{
  position:relative;
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:20px;
  margin-bottom:28px;
}

.scanner-title{
  font-family:Cormorant Garamond, serif;
  font-size:28px;
  color:var(--text);
  font-weight:500;
}

.scanner-small{
  color:var(--muted);
  margin-top:8px;
  font-family:Inter, system-ui, sans-serif;
  font-size:13px;
  font-weight:400;
}

.status-chip{
  color:var(--green);
  border:1px solid rgba(84,212,131,.35);
  background:rgba(84,212,131,.1);
  padding:9px 12px;
  border-radius:999px;
  font-family:Inter, system-ui, sans-serif;
  font-size:11px;
  letter-spacing:.12em;
  text-transform:uppercase;
  white-space:nowrap;
  font-weight:600;
}

.input-row{
  position:relative;
  display:flex;
  gap:14px;
}

.url-input{
  flex:1;
  min-width:0;
  padding:16px 22px;
  border-radius:18px;
  border:1.5px solid rgba(240,168,48,.22);
  background:rgba(255,255,255,.05);
  color:var(--text);
  outline:none;
  font-size:15px;
  font-family:Inter, system-ui, sans-serif;
  transition:all .3s ease;
  font-weight:400;
}

.url-input::placeholder{
  color:var(--muted2);
}

.url-input:focus{
  border-color:rgba(240,168,48,.65);
  background:rgba(255,255,255,.08);
  box-shadow:0 0 0 4px rgba(240,168,48,.1);
}

.scan-btn{
  width:164px;
  border-radius:18px;
  border:0;
  background:linear-gradient(135deg, var(--gold), var(--gold2));
  color:#080805;
  font-family:Inter, system-ui, sans-serif;
  font-weight:700;
  letter-spacing:.12em;
  text-transform:uppercase;
  cursor:pointer;
  transition:all .3s var(--transition);
  font-size:12px;
}

.scan-btn:hover:not(:disabled){
  transform:translateY(-3px);
  box-shadow:0 20px 48px rgba(240,168,48,.25);
}

.scan-btn:active:not(:disabled){
  transform:translateY(-1px);
}

.scan-btn:disabled{
  opacity:.7;
  cursor:not-allowed;
  transform:none;
}

.loading{
  display:none;
  margin-top:28px;
  align-items:center;
  gap:12px;
  color:var(--muted);
  font-family:Inter, system-ui, sans-serif;
  font-size:13px;
  animation:fadeIn .4s ease;
}

.loading.show{
  display:flex;
}

@keyframes fadeIn{
  from{opacity:0}
  to{opacity:1}
}

.spinner{
  width:18px;
  height:18px;
  border-radius:50%;
  border:2px solid rgba(240,168,48,.18);
  border-top-color:var(--gold);
  animation:spin .8s linear infinite;
}

@keyframes spin{
  to{transform:rotate(360deg)}
}

.error{
  display:none;
  margin-top:22px;
  padding:16px 18px;
  border:1px solid rgba(255,92,104,.35);
  background:rgba(255,92,104,.1);
  color:#ff9ca4;
  border-radius:16px;
  font-family:Inter, system-ui, sans-serif;
  font-size:13px;
  line-height:1.6;
  animation:slideDown .3s ease;
}

.error.show{
  display:block;
}

@keyframes slideDown{
  from{
    opacity:0;
    transform:translateY(-10px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

/* Result */

.result{
  display:none;
  margin-top:32px;
  padding-top:32px;
  border-top:1px solid rgba(240,168,48,.12);
  animation:slideDown .4s ease;
}

.result.show{
  display:block;
}

.verdict-line{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:20px;
  flex-wrap:wrap;
  margin-bottom:24px;
}

.verdict-left{
  display:flex;
  align-items:center;
  gap:18px;
}

.verdict-orb{
  width:18px;
  height:18px;
  border-radius:50%;
  background:var(--muted);
  box-shadow:0 0 24px rgba(255,255,255,.12);
  animation:pulse-orb .6s ease;
}

@keyframes pulse-orb{
  0%{
    transform:scale(0.8);
    opacity:0;
  }
  100%{
    transform:scale(1);
    opacity:1;
  }
}

.verdict-orb.safe{
  background:var(--green);
  box-shadow:0 0 30px rgba(84,212,131,.45);
}

.verdict-orb.suspicious{
  background:var(--orange);
  box-shadow:0 0 30px rgba(240,168,48,.45);
}

.verdict-orb.dangerous{
  background:var(--red);
  box-shadow:0 0 30px rgba(255,92,104,.45);
}

.verdict-orb.unknown{
  background:var(--blue);
  box-shadow:0 0 30px rgba(120,166,255,.45);
}

.verdict-text{
  font-family:Cormorant Garamond, serif;
  font-size:38px;
  text-transform:capitalize;
  font-weight:500;
}

.source-pill{
  padding:9px 13px;
  border-radius:999px;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(240,168,48,.25);
  color:var(--gold2);
  font-family:Inter, system-ui, sans-serif;
  font-size:11px;
  letter-spacing:.12em;
  text-transform:uppercase;
  font-weight:600;
}

.result-url{
  margin-top:18px;
  margin-bottom:6px;
  color:var(--muted);
  font-family:Inter, system-ui, sans-serif;
  font-size:13px;
  word-break:break-all;
  line-height:1.6;
  opacity:.8;
}

.stats{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:14px;
  margin-top:28px;
}

.stat{
  padding:22px;
  border-radius:20px;
  border:1px solid rgba(255,255,255,.08);
  background:rgba(255,255,255,.04);
  backdrop-filter:blur(10px);
  transition:all .3s ease;
}

.stat:hover{
  background:rgba(255,255,255,.08);
  border-color:rgba(240,168,48,.25);
  transform:translateY(-2px);
}

.stat-num{
  font-family:Cormorant Garamond, serif;
  font-size:38px;
  line-height:1;
  color:var(--text);
}

.stat-label{
  margin-top:8px;
  color:var(--muted);
  font-family:Inter, system-ui, sans-serif;
  font-size:11px;
  letter-spacing:.12em;
  text-transform:uppercase;
  font-weight:600;
}

.locked-box{
  display:none;
  margin-top:24px;
  padding:20px;
  border-radius:20px;
  border:1px solid rgba(240,168,48,.25);
  background:rgba(240,168,48,.08);
  color:var(--gold2);
  font-family:Inter, system-ui, sans-serif;
  font-size:13px;
  line-height:1.7;
  animation:slideDown .3s ease;
}

.locked-box.show{
  display:block;
}

.flagged{
  margin-top:28px;
}

.flagged-title{
  color:var(--muted);
  font-family:Inter, system-ui, sans-serif;
  font-size:11px;
  letter-spacing:.14em;
  text-transform:uppercase;
  margin-bottom:12px;
  font-weight:600;
}

.flag-list{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
}

.flag{
  padding:8px 12px;
  border-radius:12px;
  background:rgba(255,92,104,.08);
  border:1px solid rgba(255,92,104,.25);
  color:#ff9ca4;
  font-family:Inter, system-ui, sans-serif;
  font-size:11px;
  font-weight:500;
  transition:all .2s ease;
}

.flag:hover{
  background:rgba(255,92,104,.12);
  border-color:rgba(255,92,104,.45);
}

.result-actions{
  display:flex;
  flex-wrap:wrap;
  gap:12px;
  margin-top:28px;
}

.message-box{
  margin-top:22px;
  padding:18px 20px;
  border-radius:18px;
  background:rgba(84,212,131,.08);
  border:1px solid rgba(84,212,131,.25);
  color:#a4e5c5;
  font-family:Inter, system-ui, sans-serif;
  font-size:13px;
  line-height:1.7;
  animation:slideDown .3s ease;
}

/* Sections */

.section{
  padding:90px 22px;
  scroll-margin-top:96px;
}

.section-inner{
  width:min(1120px,100%);
  margin:0 auto;
}

.section-head{
  text-align:center;
  margin-bottom:50px;
}

.section-kicker{
  color:var(--gold);
  font-family:Inter, system-ui, sans-serif;
  font-size:12px;
  letter-spacing:.18em;
  text-transform:uppercase;
  margin-bottom:16px;
  font-weight:700;
}

.section-title{
  font-family:Cormorant Garamond, serif;
  font-size:clamp(38px, 5vw, 66px);
  line-height:.95;
  font-weight:400;
}

.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
}

.feature-card,
.plan-card,
.history-card{
  border:1px solid rgba(255,255,255,.08);
  background:rgba(255,255,255,.04);
  border-radius:24px;
  padding:32px;
  box-shadow:0 16px 40px rgba(0,0,0,.18);
  transition:all .3s ease;
}

.feature-card:hover,
.history-card:hover{
  border-color:rgba(240,168,48,.25);
  background:rgba(255,255,255,.07);
  transform:translateY(-4px);
}

.feature-num{
  color:var(--gold);
  font-family:Inter, system-ui, sans-serif;
  font-size:12px;
  letter-spacing:.16em;
  margin-bottom:20px;
  font-weight:700;
}

.feature-title{
  font-size:20px;
  font-weight:700;
  margin-bottom:12px;
  line-height:1.3;
}

.feature-copy{
  color:var(--muted);
  line-height:1.8;
  font-size:14px;
  font-weight:400;
}

.plans{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
}

.plan-card{
  position:relative;
  overflow:hidden;
}

.plan-card.highlight{
  border-color:rgba(240,168,48,.45);
  background:linear-gradient(180deg, rgba(240,168,48,.12), rgba(255,255,255,.05));
  transform:scale(1.02);
}

.plan-card.highlight::before{
  content:"";
  position:absolute;
  top:-1px;
  left:-1px;
  right:-1px;
  height:2px;
  background:linear-gradient(90deg, transparent, var(--gold), transparent);
}

.plan-card:hover:not(.highlight){
  border-color:rgba(240,168,48,.25);
  background:rgba(255,255,255,.07);
}

.plan-name{
  font-family:Cormorant Garamond, serif;
  font-size:36px;
  colo
