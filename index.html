  <style>
    :root {
      --gold: #f5a623;
      --gold-light: #ffd060;
      --gold-dim: #8a6010;
      --black: #000;
      --black-card: #0d0d0d;
      --black-border: #1a1a1a;
      --text: #e8dfc8;
      --text-dim: #5a5040;
      --danger: #e84040;
      --danger-bg: #120404;
      --warning: #f5a623;
      --warning-bg: #120e00;
      --safe: #3ecf70;
      --safe-bg: #021008;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    #galaxy {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
    }

    body {
      background: #000;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .wrapper {
      position: relative; z-index: 1;
      max-width: 700px; margin: 0 auto; padding: 0 28px;
    }

    header {
      display: flex; flex-direction: column; align-items: center;
      padding: 72px 0 52px;
      animation: fadeDown 1s ease both;
    }

    .logo-img {
      width: 130px;
      filter: drop-shadow(0 0 28px rgba(245,166,35,0.45)) drop-shadow(0 0 56px rgba(245,166,35,0.18));
      animation: floatLogo 4s ease-in-out infinite;
      margin-bottom: 20px;
    }
    @keyframes floatLogo {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-8px); }
    }

    .brand-tagline {
      font-size: 0.6rem; letter-spacing: 0.4em;
      text-transform: uppercase; color: var(--text-dim); text-align: center;
    }

    .scan-section { animation: fadeUp 0.9s 0.3s ease both; }

    .section-label {
      font-size: 0.6rem; letter-spacing: 0.4em;
      text-transform: uppercase; color: var(--gold-dim);
      margin-bottom: 14px;
      display: flex; align-items: center; gap: 12px;
    }
    .section-label::after {
      content: ''; flex: 1; height: 1px;
      background: linear-gradient(90deg, var(--black-border), transparent);
    }

    .input-group {
      display: flex; border: 1px solid var(--black-border);
      border-radius: 3px; overflow: hidden; background: var(--black-card);
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    .input-group:focus-within {
      border-color: rgba(245,166,35,0.3);
      box-shadow: 0 0 0 1px rgba(245,166,35,0.06), 0 0 24px rgba(245,166,35,0.05);
    }

    #url-input {
      flex: 1; background: transparent; border: none; outline: none;
      padding: 18px 22px; font-family: 'DM Mono', monospace;
      font-size: 0.83rem; color: var(--text); caret-color: var(--gold);
    }
    #url-input::placeholder { color: var(--text-dim); }

    #scan-btn {
      background: var(--gold); border: none; padding: 18px 30px;
      font-family: 'DM Mono', monospace; font-size: 0.7rem;
      font-weight: 500; letter-spacing: 0.2em; text-transform: uppercase;
      color: #000; cursor: pointer;
      transition: background 0.2s, box-shadow 0.2s; white-space: nowrap;
    }
    #scan-btn:hover { background: var(--gold-light); box-shadow: 0 0 20px rgba(245,166,35,0.3); }
    #scan-btn:active { transform: scale(0.98); }
    #scan-btn:disabled { background: var(--gold-dim); cursor: not-allowed; opacity: 0.6; }

    .scan-meta {
      display: flex; justify-content: space-between;
      align-items: center; margin-top: 10px;
    }
    .hint { font-size: 0.6rem; color: var(--text-dim); letter-spacing: 0.06em; }
    #scans-left { font-size: 0.6rem; color: var(--gold-dim); letter-spacing: 0.06em; }

    #loading {
      display: none; flex-direction: column;
      align-items: center; gap: 18px; padding: 52px 0;
    }
    .spinner-ring {
      width: 44px; height: 44px;
      border: 1px solid var(--black-border);
      border-top-color: var(--gold);
      border-right-color: rgba(245,166,35,0.4);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    .loading-text {
      font-size: 0.62rem; letter-spacing: 0.35em;
      text-transform: uppercase; color: var(--text-dim);
      animation: pulse 1.5s ease-in-out infinite;
    }

    #results { display: none; margin-top: 28px; animation: fadeUp 0.5s ease both; }

    .verdict-card {
      border-radius: 3px; padding: 28px 32px;
      border: 1px solid; margin-bottom: 16px;
      position: relative; overflow: hidden;
    }
    .verdict-card::before {
      content: ''; position: absolute;
      top: 0; left: 0; right: 0; height: 1px;
    }
    .verdict-card.danger  { background: var(--danger-bg);  border-color: rgba(232,64,64,0.15); }
    .verdict-card.danger::before  { background: var(--danger); box-shadow: 0 0 12px var(--danger); }
    .verdict-card.warning { background: var(--warning-bg); border-color: rgba(245,166,35,0.15); }
    .verdict-card.warning::before { background: var(--warning); box-shadow: 0 0 12px var(--warning); }
    .verdict-card.safe    { background: var(--safe-bg);    border-color: rgba(62,207,112,0.15); }
    .verdict-card.safe::before    { background: var(--safe); box-shadow: 0 0 12px var(--safe); }

    .verdict-badge {
      font-size: 0.58rem; letter-spacing: 0.4em; text-transform: uppercase;
      padding: 4px 12px; border-radius: 2px;
      display: inline-block; margin-bottom: 14px;
    }
    .danger  .verdict-badge { background: rgba(232,64,64,0.12);  color: var(--danger);  border: 1px solid rgba(232,64,64,0.2); }
    .warning .verdict-badge { background: rgba(245,166,35,0.12); color: var(--warning); border: 1px solid rgba(245,166,35,0.2); }
    .safe    .verdict-badge { background: rgba(62,207,112,0.12); color: var(--safe);    border: 1px solid rgba(62,207,112,0.2); }

    .verdict-icon { font-size: 1.8rem; margin-bottom: 10px; display: block; }
    .verdict-message {
      font-family: 'Cormorant Garamond', serif; font-size: 1.1rem;
      font-weight: 600; color: var(--text); line-height: 1.5; margin-bottom: 6px;
    }
    .verdict-url { font-size: 0.65rem; color: var(--text-dim); word-break: break-all; }

    .result-panel {
      background: var(--black-card); border: 1px solid var(--black-border);
      border-radius: 3px; padding: 18px 20px; margin-bottom: 12px;
    }
    .panel-title {
      font-size: 0.58rem; letter-spacing: 0.35em;
      text-transform: uppercase; color: var(--text-dim); margin-bottom: 12px;
    }
    .tag-row { display: flex; flex-wrap: wrap; gap: 8px; }
    .tag { font-size: 0.62rem; padding: 4px 11px; border-radius: 2px; letter-spacing: 0.04em; }
    .tag.threat { background: rgba(232,64,64,0.08); border: 1px solid rgba(232,64,64,0.18); color: var(--danger); }
    .tag.engine { background: rgba(245,166,35,0.06); border: 1px solid rgba(245,166,35,0.14); color: var(--gold-dim); }
    .tag.clear  { color: var(--safe); font-size: 0.7rem; }

    .upsell-card {
      background: linear-gradient(135deg, #0d0a00, #1a1200);
      border: 1px solid rgba(245,166,35,0.2);
      border-radius: 3px; padding: 32px; text-align: center; margin-top: 28px;
    }
    .upsell-title {
      font-family: 'Cormorant Garamond', serif; font-size: 1.3rem;
      font-weight: 700; color: var(--gold); margin-bottom: 10px;
    }
    .upsell-sub { font-size: 0.7rem; color: var(--text-dim); line-height: 1.7; }

    .error-card {
      background: var(--danger-bg); border: 1px solid rgba(232,64,64,0.15);
      border-radius: 3px; padding: 22px; margin-top: 28px;
      animation: fadeUp 0.4s ease both;
    }
    .error-title { font-size: 0.58rem; letter-spacing: 0.35em; text-transform: uppercase; color: var(--danger); margin-bottom: 8px; }
    .error-msg { font-size: 0.78rem; color: var(--text-dim); line-height: 1.6; }

    .result-screenshot { margin-top: 14px; border-radius: 3px; overflow: hidden; border: 1px solid var(--black-border); opacity: 0.75; }
    .result-screenshot img { width: 100%; display: block; }

    hr { border: none; border-top: 1px solid var(--black-border); margin: 36px 0; }

    footer {
      text-align: center; padding: 40px 0 28px;
      font-size: 0.58rem; letter-spacing: 0.2em; color: var(--text-dim);
      animation: fadeUp 1s 0.5s ease both;
    }
    footer span { color: var(--gold-dim); }

    @keyframes fadeDown { from { opacity:0; transform:translateY(-20px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeUp   { from { opacity:0; transform:translateY(16px);  } to { opacity:1; transform:translateY(0); } }
    @keyframes spin     { to { transform: rotate(360deg); } }
    @keyframes pulse    { 0%,100% { opacity:0.4; } 50% { opacity:1; } }

    @media (max-width: 480px) {
      .logo-img { width: 100px; }
      #scan-btn { padding: 18px 18px; }
    }
  </style>
</head>

  }

  for (var i=0;i<N;i++) stars.push(mkStar());

  window.addEventListener("resize", function() {
    resize();
    stars.forEach(function(s){s.bx=Math.random()*W;s.by=Math.random()*H;s.ox=0;s.oy=0;});
  });
  window.addEventListener("mousemove", function(e){mouse.x=e.clientX;mouse.y=e.clientY;});
  window.addEventListener("mouseleave", function(){mouse.x=-9999;mouse.y=-9999;});

  function draw(t) {
    ctx.clearRect(0,0,W,H);
    var g=ctx.createRadialGradient(W*0.5,H*0.4,0,W*0.5,H*0.4,W*0.35);
    g.addColorStop(0,"rgba(245,166,35,0.025)");g.addColorStop(1,"transparent");
    ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
    stars.forEach(function(s) {
      var tw=s.alpha*(0.55+0.45*Math.sin(t*s.ts+s.to));
      var dx=mouse.x-(s.bx+s.ox),dy=mouse.y-(s.by+s.oy);
      var dist=Math.sqrt(dx*dx+dy*dy),R=130;
      if(dist<R&&dist>1){s.ox+=dx*0.022*(1-dist/R);s.oy+=dy*0.022*(1-dist/R);}
      else{s.ox*=0.92;s.oy*=0.92;}
      var px=s.bx+s.ox,py=s.by+s.oy;
      var halo=ctx.createRadialGradient(px,py,0,px,py,s.size*4);
      halo.addColorStop(0,s.gold?"rgba(245,166,35,"+(tw*0.45)+")":"rgba(255,240,180,"+(tw*0.3)+")");
      halo.addColorStop(1,"transparent");
      ctx.fillStyle=halo;ctx.beginPath();ctx.arc(px,py,s.size*4,0,Math.PI*2);ctx.fill();
      ctx.globalAlpha=tw;ctx.fillStyle=s.gold?"#f5a623":"#fff8e0";
      ctx.beginPath();ctx.arc(px,py,s.size,0,Math.PI*2);ctx.fill();
      ctx.globalAlpha=1;
    });
    requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);
})();

// APP
var input=document.getElementById("url-input");
var loading=document.getElementById("loading");
var results=document.getElementById("results");
var btn=document.getElementById("scan-btn");

input.addEventListener("keydown",function(e){if(e.key==="Enter")scanURL();});

function updateScansLeft(n){
  var el=document.getElementById("scans-left");
  if(!el||n===undefined)return;
  if(n===0){el.textContent="No free scans left today";el.style.color="var(--danger)";}
  else{el.textContent=n+" free scan"+(n===1?"":"s")+" left today";el.style.color=n<=3?"var(--warning)":"var(--gold-dim)";}
}

function scanURL(){
  var url=input.value.trim();
  if(!url){input.focus();return;}
  btn.disabled=true;btn.textContent="Scanning...";
  results.style.display="none";results.innerHTML="";loading.style.display="flex";
  fetch("/scan",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({url:url})})
  .then(function(res){return res.json();})
  .then(function(data){
    loading.style.display="none";
    if(data.rate_limited){showUpsell();updateScansLeft(0);}
    else if(data.error){showError(data.error);}
    else{showResults(data);}
    btn.disabled=false;btn.textContent="Scan";
  })
  .catch(function(){
    loading.style.display="none";
    showError("Connection failed. Check your internet and try again.");
    btn.disabled=false;btn.textContent="Scan";
  });
}

function esc(str){
  if(!str)return"";
  var d=document.createElement("div");
  d.appendChild(document.createTextNode(str));
  return d.innerHTML;
}

function showResults(d){
  if(d.scans_remaining!==undefined)updateScansLeft(d.scans_remaining);
  var icons={danger:"&#128680;",warning:"&#9888;&#65039;",safe:"&#9989;"};
  var vc=d.verdict_class||"safe";
  var signals=(d.danger_signals||[]).concat(d.warning_signals||[]);
  var sHTML=signals.length?signals.map(function(s){return"<span class='tag threat'>"+esc(s)+"</span>";}).join(""):"<span class='tag clear'>No threats detected</span>";
  var eHTML=(d.engines_checked||[]).map(function(e){return"<span class='tag engine'>"+esc(e)+"</span>";}).join("");
  var shot=d.screenshot?"<div class='result-screenshot'><img src='"+d.screenshot+"' alt='preview'/></div>":"";
  results.innerHTML=
    "<div class='verdict-card "+vc+"'>"+
      "<span class='verdict-icon'>"+(icons[vc]||"&#9989;")+"</span>"+
      "<span class='verdict-badge'>"+esc(d.verdict)+"</span>"+
      "<div class='verdict-message'>"+esc(d.message)+"</div>"+
      "<div class='verdict-url'>"+esc(d.url||input.value)+"</div>"+shot+
    "</div>"+
    "<div class='result-panel'>"+
      "<div class='panel-title'>Threats detected</div>"+
      "<div class='tag-row'>"+sHTML+"</div>"+
    "</div>"+
    "<div class='result-panel'>"+
      "<div class='panel-title'>Engines checked</div>"+
      "<div class='tag-row'>"+eHTML+"</div>"+
    "</div>";
  results.style.display="block";
  results.scrollIntoView({behavior:"smooth",block:"nearest"});
}

function showUpsell(){
  results.innerHTML=
    "<div class='upsell-card'>"+
      "<div class='verdict-icon'>&#128274;</div>"+
      "<div class='upsell-title'>Daily limit reached</div>"+
      "<div class='upsell-sub'>You have used all 10 free scans for today.<br>LidaShield Pro &mdash; unlimited scans, breach checker &amp; more &mdash; coming soon.</div>"+
    "</div>";
  results.style.display="block";
}

function showError(msg){
  results.innerHTML="<div class='error-card'><div class='error-title'>Error</div><div class='error-msg'>"+msg+"</div></div>";
  results.style.display="block";
}

fetch("/remaining").then(function(r){return r.json();}).then(function(d){updateScansLeft(d.scans_remaining);}).catch(function(){});
</script>
