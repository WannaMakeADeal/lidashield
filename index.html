<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LidaShield — Scam Link Checker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    :root {
      --gold: #f5a623;
      --gold-light: #ffc85a;
      --gold-dim: #a06b10;
      --black: #000000;
      --black-soft: #0a0a0a;
      --black-card: #111111;
      --black-border: #1e1e1e;
      --text: #e8e0d0;
      --text-dim: #7a7060;
      --danger: #e84040;
      --danger-bg: #1a0505;
      --warning: #f5a623;
      --warning-bg: #1a1000;
      --caution: #e8c840;
      --caution-bg: #161300;
      --safe: #40c870;
      --safe-bg: #041408;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--black);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── NOISE TEXTURE OVERLAY ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.6;
    }

    /* ── AMBIENT GLOW ── */
    body::after {
      content: '';
      position: fixed;
      top: -30vh;
      left: 50%;
      transform: translateX(-50%);
      width: 60vw;
      height: 60vw;
      background: radial-gradient(ellipse, rgba(245,166,35,0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── LAYOUT ── */
    .wrapper {
      position: relative;
      z-index: 1;
      max-width: 720px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* ── HEADER ── */
    header {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 64px 0 48px;
      animation: fadeDown 0.8s ease both;
    }

    .logo-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      margin-bottom: 32px;
    }

    /* SVG Logo — triple-L with globe */
    .logo-svg {
      width: 80px;
      height: 96px;
      filter: drop-shadow(0 0 16px rgba(245,166,35,0.4));
    }

    .brand-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.4rem;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 0.04em;
      line-height: 1;
    }

    .brand-tagline {
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-top: 4px;
    }

    /* ── SCAN SECTION ── */
    .scan-section {
      animation: fadeUp 0.8s 0.2s ease both;
    }

    .section-label {
      font-size: 0.65rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--gold-dim);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--black-border);
    }

    .input-group {
      display: flex;
      gap: 0;
      border: 1px solid var(--black-border);
      border-radius: 4px;
      overflow: hidden;
      transition: border-color 0.2s;
      background: var(--black-card);
    }
    .input-group:focus-within {
      border-color: var(--gold-dim);
    }

    #url-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      padding: 18px 20px;
      font-family: 'DM Mono', monospace;
      font-size: 0.85rem;
      color: var(--text);
      caret-color: var(--gold);
    }
    #url-input::placeholder { color: var(--text-dim); }

    #scan-btn {
      background: var(--gold);
      border: none;
      padding: 18px 28px;
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--black);
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
    }
    #scan-btn:hover { background: var(--gold-light); }
    #scan-btn:active { transform: scale(0.98); }
    #scan-btn:disabled {
      background: var(--gold-dim);
      cursor: not-allowed;
    }

    .hint {
      font-size: 0.65rem;
      color: var(--text-dim);
      margin-top: 10px;
      letter-spacing: 0.05em;
    }

    /* ── LOADING ── */
    #loading {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 48px 0;
      animation: fadeUp 0.4s ease both;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 2px solid var(--black-border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    .loading-text {
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    /* ── RESULTS ── */
    #results {
      display: none;
      margin-top: 32px;
      animation: fadeUp 0.5s ease both;
    }

    .verdict-card {
      border-radius: 4px;
      padding: 32px;
      border: 1px solid;
      margin-bottom: 24px;
      position: relative;
      overflow: hidden;
    }
    .verdict-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
    }

    .verdict-card.danger  { background: var(--danger-bg);  border-color: rgba(232,64,64,0.3); }
    .verdict-card.danger::before  { background: var(--danger); }
    .verdict-card.warning { background: var(--warning-bg); border-color: rgba(245,166,35,0.3); }
    .verdict-card.warning::before { background: var(--warning); }
    .verdict-card.caution { background: var(--caution-bg); border-color: rgba(232,200,64,0.3); }
    .verdict-card.caution::before { background: var(--caution); }
    .verdict-card.safe    { background: var(--safe-bg);    border-color: rgba(64,200,112,0.3); }
    .verdict-card.safe::before    { background: var(--safe); }

    .verdict-badge {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      padding: 5px 12px;
      border-radius: 2px;
      display: inline-block;
      margin-bottom: 16px;
    }
    .danger  .verdict-badge  { background: rgba(232,64,64,0.15);  color: var(--danger); }
    .warning .verdict-badge { background: rgba(245,166,35,0.15); color: var(--warning); }
    .caution .verdict-badge { background: rgba(232,200,64,0.15); color: var(--caution); }
    .safe    .verdict-badge  { background: rgba(64,200,112,0.15); color: var(--safe); }

    .verdict-icon {
      font-size: 2rem;
      margin-bottom: 12px;
      display: block;
    }

    .verdict-message {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.15rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1.5;
      margin-bottom: 8px;
    }

    .verdict-url {
      font-size: 0.7rem;
      color: var(--text-dim);
      word-break: break-all;
      letter-spacing: 0.02em;
    }

    /* Stats grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }

    .stat-box {
      background: var(--black-card);
      border: 1px solid var(--black-border);
      border-radius: 4px;
      padding: 16px 12px;
      text-align: center;
    }

    .stat-value {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      font-weight: 700;
      line-height: 1;
      margin-bottom: 6px;
    }
    .stat-value.danger  { color: var(--danger); }
    .stat-value.warning { color: var(--warning); }
    .stat-value.caution { color: var(--caution); }
    .stat-value.neutral { color: var(--text-dim); }
    .stat-value.safe    { color: var(--safe); }

    .stat-label {
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    /* Flagged engines */
    .flagged-section {
      background: var(--black-card);
      border: 1px solid var(--black-border);
      border-radius: 4px;
      padding: 20px;
    }

    .flagged-title {
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 14px;
    }

    .engine-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .engine-tag {
      font-size: 0.65rem;
      padding: 4px 10px;
      border-radius: 2px;
      background: rgba(232,64,64,0.08);
      border: 1px solid rgba(232,64,64,0.2);
      color: var(--danger);
      letter-spacing: 0.05em;
    }

    .no-flags {
      font-size: 0.75rem;
      color: var(--safe);
    }

    /* Error */
    .error-card {
      background: #0f0808;
      border: 1px solid rgba(232,64,64,0.2);
      border-radius: 4px;
      padding: 24px;
      margin-top: 32px;
      animation: fadeUp 0.4s ease both;
    }
    .error-card .error-title {
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--danger);
      margin-bottom: 8px;
    }
    .error-card .error-msg {
      font-size: 0.8rem;
      color: var(--text-dim);
    }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 48px 0 32px;
      font-size: 0.62rem;
      letter-spacing: 0.15em;
      color: var(--text-dim);
      animation: fadeUp 0.8s 0.4s ease both;
    }
    footer span { color: var(--gold-dim); }

    /* ── DIVIDER ── */
    .divider {
      border: none;
      border-top: 1px solid var(--black-border);
      margin: 32px 0;
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 480px) {
      .brand-name { font-size: 1.8rem; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      #scan-btn { padding: 18px 18px; }
    }
  </style>
</head>

          <div class="brand-name">LidaShield</div>
          <div class="brand-tagline">Scam Detection · Powered by VirusTotal</div>
        </div>
      </div>
    </header>

    <!-- SCAN SECTION -->
    <section class="scan-section">
      <div class="section-label">Scan a link</div>
      <div class="input-group">
        <input
          id="url-input"
          type="text"
          placeholder="Paste any URL — e.g. https://suspicious-site.com"
          autocomplete="off"
          autocorrect="off"
          autocapitalize="off"
          spellcheck="false"
        />
        <button id="scan-btn" onclick="scanURL()">Scan</button>
      </div>
      <p class="hint">Checks against 90+ security engines. Results in seconds.</p>
    </section>

    <!-- LOADING -->
    <div id="loading">
      <div class="spinner"></div>
      <div class="loading-text">Scanning link...</div>
    </div>

    <!-- RESULTS -->
    <div id="results"></div>

    <hr class="divider" />

    <!-- FOOTER -->
    <footer>
      <span>LidaShield</span> — Protecting Singapore &amp; Southeast Asia · lidashield.com
    </footer>

  </div>

  <script>
    const input = document.getElementById('url-input');
    const loading = document.getElementById('loading');
    const results = document.getElementById('results');
    const btn = document.getElementById('scan-btn');

    // Allow Enter key to trigger scan
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') scanURL();
    });

    async function scanURL() {
      const url = input.value.trim();
      if (!url) {
        input.focus();
        return;
      }

      // UI: start loading
      btn.disabled = true;
      btn.textContent = 'Scanning...';
      results.style.display = 'none';
      results.innerHTML = '';
      loading.style.display = 'flex';

      try {
        const res = await fetch('/scan', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url })
        });

        const data = await res.json();
        loading.style.display = 'none';

        if (data.error) {
          showError(data.error);
        } else {
          showResults(data);
        }
      } catch (err) {
        loading.style.display = 'none';
        showError('Connection failed. Please check your internet and try again.');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Scan';
      }
    }

    function showResults(d) {
      const icons = {
        danger:  '🚨',
        warning: '⚠️',
        caution: '🔔',
        safe:    '✅'
      };

      const flaggedHTML = d.flagged_by && d.flagged_by.length > 0
        ? d.flagged_by.map(e => `<span class="engine-tag">${e}</span>`).join('')
        : `<span class="no-flags">No engines flagged this URL.</span>`;

      results.innerHTML = `
        <div class="verdict-card ${d.verdict_class}">
          <span class="verdict-icon">${icons[d.verdict_class]}</span>
          <span class="verdict-badge">${d.verdict}</span>
          <div class="verdict-message">${d.message}</div>
          <div class="verdict-url">${escapeHtml(d.url || input.value)}</div>
        </div>

        <div class="stats-grid">
          <div class="stat-box">
            <div class="stat-value ${d.malicious > 0 ? 'danger' : 'neutral'}">${d.malicious}</div>
            <div class="stat-label">Malicious</div>
          </div>
          <div class="stat-box">
            <div class="stat-value ${d.suspicious > 0 ? 'warning' : 'neutral'}">${d.suspicious}</div>
            <div class="stat-label">Suspicious</div>
          </div>
          <div class="stat-box">
            <div class="stat-value safe">${d.harmless}</div>
            <div class="stat-label">Harmless</div>
          </div>
          <div class="stat-box">
            <div class="stat-value neutral">${d.undetected}</div>
            <div class="stat-label">Undetected</div>
          </div>
        </div>

        <div class="flagged-section">
          <div class="flagged-title">Flagged by engines</div>
          <div class="engine-tags">${flaggedHTML}</div>
        </div>
      `;

      results.style.display = 'block';
      results.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function showError(msg) {
      results.innerHTML = `
        <div class="error-card">
          <div class="error-title">Error</div>
          <div class="error-msg">${escapeHtml(msg)}</div>
        </div>
      `;
      results.style.display = 'block';
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.appendChild(document.createTextNode(str));
      return div.innerHTML;
    }
  </script>
